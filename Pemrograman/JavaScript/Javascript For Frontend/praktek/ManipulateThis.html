<!DOCTYPE html>
<html>
    <head>
        <title>Welcome to Cube World!</title>
          <style>
            button {
            width: 200px;
            font-size: 15px;
            margin: 8px;
            padding: 3px;
            }
            
            main {
            margin: 2px;
            }
        </style>
    </head>
    <body>
        <div align="center">
            <h2>Its Cube Time!</h2>
            <img id="gambar"
                src="https://assets.cdn.dicoding.com/original/commons/homepage-dicoding-challenge-illustration.png"
                alt="Its a rubiks cube!" width="150" height="100">
            <p id="caption"><b></b></p>
            <div class="button-group">
                <div class="button">
                    <button>Sejarah</button>
                </div>
                <div class="button">
                    <button>Permainan</button>
                </div>
                <div class="button">
                    <button><i>Fun Fact</i></button>
                </div>
                <div class="button">
                    <button>Play (Coming Soon)</button>
                </div>
                <div class="button">
                    <button>Exit</button>
                </div>
            </div>
        </div>
        <hr size="2" width="95%" color="black">
        <div id="links">
            <p>Situs lainnya yang tidak kalah menarik:</p>
            <ul>
                <li><a href="http://www.dicoding.com" id="dicodingLink">Dicoding</a></li>
                <li><a href="http://www.google.com" id="googleLink">Google</a></li>
            </ul>
        </div>
    </body>
</html>



<script>
// Prompt
// let pesan = prompt("masukan pesan anda, nama");
// const nama = document.getElementById('caption').innerHTML = ("Sudah siap "+pesan+" untuk memecahkan teka-teki permainan tersebut? ");


// Mengubah ukuran gambar
const gambar = document.getElementById('gambar');
gambar.setAttribute('width', 300);
gambar.setAttribute('height', 215);

// Mengubah Play (Coming Soon)
const buttons = document.querySelectorAll('.button')[3].children[0];
buttons.setAttribute('disabled', true);

// Mengubah Text (innerTEXT)
const dicoding = document.getElementById('dicodingLink');
const google = document.getElementById('googleLink');

dicoding.innerText = 'Belajar Programming di Dicoding';
google.innerText = 'Mencari sesuatu di Google';

// Mengubah Konten (innerHtml)
dicoding.innerHTML = '<i>Belajar Programming di Dicoding</i>';
google.innerHTML = '<i>Mencari sesuatu di Google</i>';

// Mengubah style (Style.property)
const buttonstyle = document.getElementsByClassName('button');
for (const button of buttonstyle) {
  button.children[0].style.borderRadius = '6px';
}
</script>
