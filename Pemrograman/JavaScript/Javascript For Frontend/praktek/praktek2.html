<!DOCTYPE html>
<html>
    <head>
        <title>Memasak Air</title>
    </head>
    <body>
        <p id="name">Langkah-langkah memasak air</p>
        <ol id="daftar">
            <li id="awal">Masukkan air ke dalam wadah.</li>
            <li id="akhir">Matikan kompor.</li>
        </ol>
        <hr size="2" width="95%" color="black">
    </body>
</html>

<script>
//appendChild
const newElement = document.createElement('li');
newElement.innerText = 'Selamat Menikmati!'
const daftar = document.getElementById('daftar');

daftar.appendChild(newElement); 

//Insertbefore
const patokan = document.getElementById('awal');
const nyalakan = document.createElement('li');
nyalakan.innerText = 'Nyalakan Kompornya terlebih dahulu';


daftar.insertBefore(nyalakan, patokan);
</script>
